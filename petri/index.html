<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Petri</title>
    <link rel="icon" href="data:,">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0a0f;
        cursor: crosshair;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      #start-overlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(ellipse at center, #0f1018 0%, #06060a 100%);
        z-index: 100;
        cursor: pointer;
        transition: opacity 0.6s ease;
      }
      #start-overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #start-overlay .prompt {
        text-align: center;
        color: #4a6;
        font-family: monospace;
        font-size: 1.2rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        animation: pulse 2s ease-in-out infinite;
      }
      #start-overlay .title {
        font-size: 3rem;
        letter-spacing: 0.3em;
        margin-bottom: 1rem;
        color: #6c8;
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="start-overlay">
      <div>
        <div class="title prompt">PETRI</div>
        <div class="prompt">click to inoculate</div>
      </div>
    </div>
    <canvas id="petri-canvas"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
